services:
  - type: web
    name: football-license-system
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: license-db
          property: connectionString

databases:
  - name: license-db
    databaseName: license_system
    user: admin
